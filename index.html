<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>너에게 보내는 메시지 💌</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome (아이콘) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- 구글 감자꽃 폰트 (귀여운 손글씨) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Gamja+Flower&display=swap" rel="stylesheet">
    <!-- Confetti (폭죽 효과) 라이브러리 -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        body {
            font-family: 'Gamja Flower', cursive;
            background: linear-gradient(135deg, #ffe5ec 0%, #ffc2d1 100%);
            user-select: none;
            -webkit-user-select: none;
        }
        
        /* YES 버튼 두근두근 심장박동 효과 */
        @keyframes heartbeat {
            0% { transform: scale(1); }
            14% { transform: scale(1.12); }
            28% { transform: scale(1); }
            42% { transform: scale(1.12); }
            70% { transform: scale(1); }
        }
        .heartbeat-btn {
            animation: heartbeat 1.5s infinite ease-in-out;
        }

        /* 단계 전환 시 부드러운 페이드인 */
        .fade-in {
            animation: fadeIn 0.6s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 스크롤바 숨기기 */
        ::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 overflow-hidden">

    <!-- 메인 카드 컨테이너 -->
    <div class="bg-white/90 backdrop-blur-sm p-8 rounded-3xl shadow-2xl max-w-md w-full text-center border-4 border-pink-200 relative">
        
        <!-- ================= STAGE 1: 데이트 신청 질문 ================= -->
        <div id="stage-1" class="fade-in space-y-6">
            <div class="text-6xl animate-bounce">💖</div>
            <h1 class="text-4xl font-bold text-pink-600 tracking-wide">나랑 데이트 할래?</h1>
            <p class="text-xl text-gray-600">거절은 거절한다! 얼른 YES를 눌러봐 😎</p>
            
            <div class="flex justify-center items-center gap-6 pt-6 min-h-[80px]">
                <!-- YES 버튼 -->
                <button onclick="goToStage(2)" class="heartbeat-btn bg-gradient-to-r from-pink-500 to-rose-500 hover:from-pink-600 hover:to-rose-600 text-white text-2xl font-bold px-8 py-3.5 rounded-full shadow-lg transition-transform duration-150 transform hover:scale-105 active:scale-95">
                    YES! 💘
                </button>
                <!-- NO 버튼 -->
                <button id="no-btn" class="bg-gray-400 text-white text-xl font-bold px-8 py-3.5 rounded-full shadow-md transition-all duration-300 z-50">
                    NO 😢
                </button>
            </div>
        </div>

        <!-- ================= STAGE 2: 날짜 및 시간 선택 ================= -->
        <div id="stage-2" class="hidden fade-in space-y-6">
            <div class="text-6xl">🗓️</div>
            <h1 class="text-3xl font-bold text-pink-600">언제가 좋아? 시간 골라줘!</h1>
            <p class="text-lg text-gray-500">너 편한 날로 맞춰볼게!</p>

            <div class="space-y-4 text-left pt-2">
                <div>
                    <label class="block text-xl font-bold text-gray-700 mb-1"><i class="fa-regular fa-calendar-days text-pink-500 mr-1"></i> 날짜 선택</label>
                    <input type="date" id="date-input" class="w-full p-3 rounded-2xl border-2 border-pink-200 focus:border-pink-500 outline-none text-xl bg-pink-50/50 text-gray-700">
                </div>
                <div>
                    <label class="block text-xl font-bold text-gray-700 mb-1"><i class="fa-regular fa-clock text-pink-500 mr-1"></i> 시간 선택</label>
                    <input type="time" id="time-input" class="w-full p-3 rounded-2xl border-2 border-pink-200 focus:border-pink-500 outline-none text-xl bg-pink-50/50 text-gray-700">
                </div>
            </div>

            <div class="pt-4">
                <button onclick="saveDateTimeAndNext()" class="w-full bg-gradient-to-r from-pink-500 to-rose-500 hover:from-pink-600 hover:to-rose-600 text-white text-2xl font-bold py-3 rounded-2xl shadow-lg transition-transform active:scale-95">
                    다음 단계로 넘어가기 ➡️
                </button>
            </div>
        </div>

        <!-- ================= STAGE 3: 음식 메뉴 선택 ================= -->
        <div id="stage-3" class="hidden fade-in space-y-6">
            <div class="text-6xl">🍕</div>
            <h1 class="text-3xl font-bold text-pink-600">밥은 뭐가 좋아? 맛집 가자!</h1>
            <p class="text-lg text-gray-500">원하는 메뉴를 하나만 콕 집어줘!</p>

            <!-- 음식 메뉴 그리드 -->
            <div class="grid grid-cols-2 gap-3 pt-2">
                <button onclick="selectFood('초밥 🍣', this)" class="food-option-btn p-4 rounded-2xl border-2 border-gray-200 hover:border-pink-300 bg-gray-50/50 hover:bg-pink-50/30 transition-all text-xl flex flex-col items-center justify-center gap-1">
                    <span class="text-3xl">🍣</span>
                    <span class="font-bold text-gray-700">맛있는 초밥</span>
                </button>
                <button onclick="selectFood('파스타 🍝', this)" class="food-option-btn p-4 rounded-2xl border-2 border-gray-200 hover:border-pink-300 bg-gray-50/50 hover:bg-pink-50/30 transition-all text-xl flex flex-col items-center justify-center gap-1">
                    <span class="text-3xl">🍝</span>
                    <span class="font-bold text-gray-700">고급진 양식</span>
                </button>
                <button onclick="selectFood('삼겹살 🥓', this)" class="food-option-btn p-4 rounded-2xl border-2 border-gray-200 hover:border-pink-300 bg-gray-50/50 hover:bg-pink-50/30 transition-all text-xl flex flex-col items-center justify-center gap-1">
                    <span class="text-3xl">🥓</span>
                    <span class="font-bold text-gray-700">지글지글 고기</span>
                </button>
                <button onclick="selectFood('떡볶이 🌶️', this)" class="food-option-btn p-4 rounded-2xl border-2 border-gray-200 hover:border-pink-300 bg-gray-50/50 hover:bg-pink-50/30 transition-all text-xl flex flex-col items-center justify-center gap-1">
                    <span class="text-3xl">🌶️</span>
                    <span class="font-bold text-gray-700">매콤한 분식</span>
                </button>
                <button onclick="selectFood('달달한 디저트 🍰', this)" class="food-option-btn p-4 rounded-2xl border-2 border-gray-200 hover:border-pink-300 bg-gray-50/50 hover:bg-pink-50/30 transition-all text-xl flex flex-col items-center justify-center gap-1">
                    <span class="text-3xl">🍰</span>
                    <span class="font-bold text-gray-700">예쁜 카페/디저트</span>
                </button>
                <button onclick="toggleCustomFoodInput(this)" class="food-option-btn p-4 rounded-2xl border-2 border-gray-200 hover:border-pink-300 bg-gray-50/50 hover:bg-pink-50/30 transition-all text-xl flex flex-col items-center justify-center gap-1">
                    <span class="text-3xl">✍️</span>
                    <span class="font-bold text-gray-700">직접 쓸래!</span>
                </button>
            </div>

            <!-- 직접 입력 인풋창 -->
            <div id="custom-food-container" class="hidden fade-in">
                <input type="text" id="custom-food-input" placeholder="어떤 음식 먹고 싶어? 적어줘!" class="w-full p-3 rounded-2xl border-2 border-pink-300 focus:border-pink-500 outline-none text-xl bg-pink-50/50 text-gray-700 text-center">
            </div>

            <div class="pt-4">
                <button onclick="confirmAllSelection()" class="w-full bg-gradient-to-r from-pink-500 to-rose-500 hover:from-pink-600 hover:to-rose-600 text-white text-2xl font-bold py-3 rounded-2xl shadow-lg transition-transform active:scale-95">
                    예약 완료하기! 💌
                </button>
            </div>
        </div>

        <!-- ================= STAGE 4: 감동의 최종 화면 ================= -->
        <div id="stage-4" class="hidden fade-in space-y-6">
            <div class="text-7xl animate-pulse">🎉</div>
            <h1 class="text-4xl font-bold text-pink-600">데이트 신청 성공!</h1>
            
            <div class="bg-pink-50/80 p-5 rounded-2xl border-2 border-dashed border-pink-300 space-y-4">
                <p class="text-2xl font-bold text-gray-700 leading-relaxed">
                    거절 안 해줘서 고마워 💗
                </p>
                <div class="space-y-2 text-left text-xl text-gray-600 px-2 border-t border-pink-200 pt-3">
                    <p><i class="fa-regular fa-calendar-check text-pink-500 mr-2"></i>약속날짜 : <span id="final-date" class="font-bold text-gray-800"></span></p>
                    <p><i class="fa-regular fa-clock text-pink-500 mr-2"></i>만날시간 : <span id="final-time" class="font-bold text-gray-800"></span></p>
                    <p><i class="fa-solid fa-utensils text-pink-500 mr-2"></i>먹을음식 : <span id="final-food" class="font-bold text-gray-800"></span></p>
                </div>
            </div>
            
            <p class="text-2xl font-bold text-rose-500 animate-bounce pt-2">
                늦지 않게 내가 데리러 갈게! 🥰
            </p>
        </div>

    </div>

    <!-- 스크립트 제어 코드 -->
    <script>
        let selectedDate = '';
        let selectedTime = '';
        let selectedFood = '';
        let noClickCount = 0; // 거절 시도 횟수 체크 카운터

        const noBtn = document.getElementById('no-btn');

        // NO 버튼 회피 및 4번째 날아가기 처리 로직
        function escapeNoButton(e) {
            if (e) e.preventDefault();
            noClickCount++;

            // 4번째 도망갈 때는 화면 밖 우측 상단 허공으로 날려버림
            if (noClickCount >= 4) {
                noBtn.style.position = 'fixed';
                noBtn.style.left = '150vw';
                noBtn.style.top = '-50vh';
                noBtn.style.transform = 'scale(0) rotate(720deg)';
                noBtn.style.opacity = '0';
                return;
            }

            // 1~3번째는 화면 내부 랜덤 공간으로 번쩍 도망
            const padding = 30;
            const btnWidth = noBtn.offsetWidth;
            const btnHeight = noBtn.offsetHeight;

            const maxX = window.innerWidth - btnWidth - padding;
            const maxY = window.innerHeight - btnHeight - padding;

            const randomX = Math.max(padding, Math.floor(Math.random() * maxX));
            const randomY = Math.max(padding, Math.floor(Math.random() * maxY));

            noBtn.style.position = 'fixed';
            noBtn.style.left = `${randomX}px`;
            noBtn.style.top = `${randomY}px`;
        }

        // PC 마우스오버와 모바일 터치이벤트 바인딩
        noBtn.addEventListener('mouseenter', escapeNoButton);
        noBtn.addEventListener('touchstart', escapeNoButton);
        noBtn.addEventListener('click', escapeNoButton); // 확실한 방어를 위해 클릭도 차단

        function goToStage(stageNum) {
            for (let i = 1; i <= 4; i++) {
                const stage = document.getElementById(`stage-${i}`);
                if (stage) stage.classList.add('hidden');
            }
            document.getElementById(`stage-${stageNum}`).classList.remove('hidden');
        }

        function saveDateTimeAndNext() {
            const dateVal = document.getElementById('date-input').value;
            const timeVal = document.getElementById('time-input').value;

            if (!dateVal || !timeVal) {
                alert('날짜랑 시간을 모두 선택해줘야 내가 데리러 가지! 🥺');
                return;
            }

            const dateParts = dateVal.split('-');
            selectedDate = `${dateParts[0]}년 ${dateParts[1]}월 ${dateParts[2]}일`;

            const timeParts = timeVal.split(':');
            let hour = parseInt(timeParts[0]);
            const minute = timeParts[1];
            const ampm = hour >= 12 ? '오후' : '오전';
            if (hour > 12) hour -= 12;
            if (hour === 0) hour = 12;
            selectedTime = `${ampm} ${hour}시 ${minute}분`;

            goToStage(3);
        }

        function selectFood(foodName, buttonElement) {
            selectedFood = foodName;
            const allBtns = document.querySelectorAll('.food-option-btn');
            allBtns.forEach(btn => {
                btn.classList.remove('border-pink-500', 'bg-pink-100/50', 'scale-105');
                btn.classList.add('border-gray-200', 'bg-gray-50/50');
            });
            buttonElement.classList.remove('border-gray-200', 'bg-gray-50/50');
            buttonElement.classList.add('border-pink-500', 'bg-pink-100/50', 'scale-105');
            document.getElementById('custom-food-container').classList.add('hidden');
        }

        function toggleCustomFoodInput(buttonElement) {
            selectedFood = 'CUSTOM';
            const allBtns = document.querySelectorAll('.food-option-btn');
            allBtns.forEach(btn => {
                btn.classList.remove('border-pink-500', 'bg-pink-100/50', 'scale-105');
                btn.classList.add('border-gray-200', 'bg-gray-50/50');
            });
            buttonElement.classList.remove('border-gray-200', 'bg-gray-50/50');
            buttonElement.classList.add('border-pink-500', 'bg-pink-100/50', 'scale-105');
            document.getElementById('custom-food-container').classList.remove('hidden');
            document.getElementById('custom-food-input').focus();
        }

        function confirmAllSelection() {
            if (!selectedFood) {
                alert('우리 맛있는 거 뭐 먹을지 하나 골라줘! 😋');
                return;
            }

            if (selectedFood === 'CUSTOM') {
                const customVal = document.getElementById('custom-food-input').value.trim();
                if (!customVal) {
                    alert('먹고 싶은 맛있는 음식을 직접 입력해줘! ✍️');
                    return;
                }
                selectedFood = customVal;
            }

            document.getElementById('final-date').innerText = selectedDate;
            document.getElementById('final-time').innerText = selectedTime;
            document.getElementById('final-food').innerText = selectedFood;

            goToStage(4);
            triggerCelebrationConfetti();
        }

        function triggerCelebrationConfetti() {
            const duration = 4 * 1000;
            const end = Date.now() + duration;

            (function frame() {
                confetti({
                    particleCount: 3,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0 },
                    colors: ['#ff69b4', '#ffb6c1', '#ff1493', '#ffc0cb']
                });
                confetti({
                    particleCount: 3,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1 },
                    colors: ['#ff69b4', '#ffb6c1', '#ff1493', '#ffc0cb']
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            }());
        }
    </script>
</body>
</html>
